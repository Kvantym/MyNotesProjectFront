<button class="chat-fab" (click)="toggleChat()">
  <span *ngIf="!isOpen">🤖</span>
  <span *ngIf="isOpen">✕</span>
</button>

<div class="chat-container" *ngIf="isOpen">
  <div class="chat-header">
    <strong>Gemini Assistant</strong>
  </div>

  <div class="chat-messages" #scrollContainer>
    <div *ngFor="let msg of messages" [ngClass]="msg.role === 'user' ? 'user-msg' : 'ai-msg'">
      <div class="bubble">
        {{ msg.text }}
      </div>
    </div>

    <div *ngIf="isLoading" class="ai-msg">
      <div class="bubble typing">Думаю...</div>
    </div>
  </div>

  <div class="chat-input">
    <input
      [(ngModel)]="userInput"
      (keyup.enter)="sendMessage()"
      placeholder="Запитай щось у ШІ..."
    />
    <button (click)="sendMessage()" [disabled]="isLoading">🚀</button>
  </div>
</div>
