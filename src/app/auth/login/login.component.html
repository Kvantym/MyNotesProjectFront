<div class="login-container">
  <h2>{{ 'auth.loginTitle' | translate }}</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit($event)">
    <div class="form-group">
      <label for="username">{{ 'auth.username' | translate }}</label>
      <input id="username" type="text" formControlName="username" [placeholder]="'auth.enterUsername' | translate">
      <div class="error" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        {{ 'auth.invalidUsername' | translate }}
      </div>
    </div>

    <div class="form-group">
      <label for="password">{{ 'common.password' | translate }}</label>
      <input id="password" type="password" formControlName="password" [placeholder]="'auth.enterPassword' | translate">
      <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        {{ 'auth.passwordMinLength' | translate }}
      </div>
    </div>

    <button type="submit">{{ 'auth.login' | translate }}</button>
    <button type="button" class="ButtonRegister" (click)="goToRegister()">{{ 'auth.register' | translate }}</button>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </form>
</div>
