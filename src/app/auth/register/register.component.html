<div class="login-container">
  <h2>{{ 'auth.registerTitle' | translate }}</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit($event)">
    <div class="form-group">
      <label for="username">{{ 'auth.username' | translate }}</label>
      <input id="username" type="text" formControlName="username" [placeholder]="'auth.enterUsername' | translate">
      <div class="error" *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
        {{ 'auth.invalidUsername' | translate }}
      </div>
    </div>
     <div class="form-group">
      <label for="email">{{ 'common.email' | translate }}</label>
      <input id="email" type="email" formControlName="email" [placeholder]="'auth.enterEmail' | translate">
      <div class="error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
         {{ 'auth.invalidEmail' | translate }}
      </div>
    </div>

    <div class="form-group">
      <label for="password">{{ 'common.password' | translate }}</label>
      <input id="password" type="password" formControlName="password" [placeholder]="'auth.enterPassword' | translate">
      <div class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        {{ 'auth.passwordMinLength' | translate }}
      </div>
    </div>

    <button type="submit">{{ 'auth.register' | translate }}</button>
    <button type="button" class="ButtonRegister" (click)="goToLogin()">{{ 'auth.goToLogin' | translate }}</button>


    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </form>
</div>
