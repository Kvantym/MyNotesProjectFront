<div class="modal-overlay" *ngIf="cartListId"></div>

<div class="modal modal-with-right-column" *ngIf="cartListId">
  <div class="left-column">
    <div class="modal-title-wrapper">
      <h2 class="modal-title">{{ 'list.infoTitle' | translate }}</h2>
      <div class="modal-actions">
        <button class="btn icon" (click)="openUpdateListCartForm(selectedCartListData); $event.stopPropagation()" [title]="'common.edit' | translate" [attr.aria-label]="'common.edit' | translate">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
          </svg>
        </button>
        <button class="btn icon" (click)="deleteListCard(); $event.stopPropagation()" [title]="'common.delete' | translate" [attr.aria-label]="'common.delete' | translate">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M19 6 18 20H6L5 6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
          </svg>
        </button>
      </div>
    </div>

    <form [formGroup]="showCartListForm">
      <div class="form-group">
        <label for="name">{{ 'common.name' | translate }}</label>
        <input id="name" type="text" formControlName="name" readonly />
        <label></label>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="actions">
        <button type="button" class="buttonCancel" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
      </div>
    </form>
  </div>

  <div class="right-column">
    <h3>{{ 'common.history' | translate }}</h3>

    <ul *ngIf="displayedActivities.length > 0" class="activity-list">
<li *ngFor="let activity of displayedActivities" class="activity-item">
  <span class="activity-time">{{ activity.activityTime | date:'dd/MM/yy, HH:mm' }}</span>
  <span class="activity-action"><strong>{{ activity.action }}</strong></span>
  <span class="activity-info">{{ activity.activityInformation }}</span>
</li>

    </ul>

    <button
      *ngIf="currentIndex < activities.length"
      (click)="loadMoreActivities()"
      class="btn load-more">
      {{ 'common.loadMore' | translate }}
    </button>

    <p *ngIf="activities.length === 0">{{ 'common.emptyHistory' | translate }}</p>
    <p *ngIf="!activities">{{ 'common.loading' | translate }}</p>
  </div>

  <app-cartList-updateCartList
    *ngIf="isUpdateCartListModalOpen"
    [cartList]="selectedCartList"
    (closeModal)="onUpdateModalClose()"
  ></app-cartList-updateCartList>
</div>
